# dbt connection profile for RDS PostgreSQL.
#
# Credentials are injected as environment variables by the ECS task at
# container start via the `secrets` block in compute_stack.py.

data_pipeline:
  target: prod
  outputs:

    prod:
      type: postgres
      host:     "{{ env_var('POSTGRES_HOST') }}"
      port:     "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user:     "{{ env_var('POSTGRES_USER', 'admin') }}"
      pass:     "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname:   "{{ env_var('POSTGRES_DATABASE', 'data_pipeline') }}"
      schema:   raw
      threads: 4
      keepalives_idle: 240
      connect_timeout: 30
      sslmode: require

    dev:
      type: postgres
      host:     "{{ env_var('POSTGRES_HOST') }}"
      port:     "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user:     "{{ env_var('POSTGRES_USER', 'admin') }}"
      pass:     "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname:   "{{ env_var('POSTGRES_DATABASE', 'data_pipeline') }}"
      schema:   raw
      threads: 4
      sslmode: require
