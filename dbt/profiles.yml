# dbt connection profile for Snowflake.
#
# Credentials are injected as environment variables by the ECS task at
# container start \u2014 ECS pulls them from SSM Parameter Store via the
# `secrets` block in the task definition (see cdk/stacks/compute_stack.py).
#
# Do NOT commit real credentials here.

data_pipeline:
  target: prod
  outputs:

    prod:
      type: snowflake
      account:  "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user:     "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      TRANSFORMER
      database:  "{{ env_var('SNOWFLAKE_DATABASE', 'DATA_PIPELINE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'TRANSFORM_WH') }}"
      schema:    RAW           # default schema; overridden per-model via +schema
      threads: 8
      client_session_keep_alive: false
      query_tag: "dbt-pipeline"

    # Local dev target \u2014 used when running dbt from your workstation
    dev:
      type: snowflake
      account:  "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user:     "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      TRANSFORMER
      database:  "{{ env_var('SNOWFLAKE_DATABASE', 'DATA_PIPELINE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'TRANSFORM_WH') }}"
      schema:    RAW
      threads: 4
      client_session_keep_alive: false
      query_tag: "dbt-dev-{{ env_var('USER', 'local') }}"
