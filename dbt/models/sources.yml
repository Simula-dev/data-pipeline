version: 2

sources:
  - name: raw
    description: "Raw landing zone populated by the load Lambda."
    database: "{{ env_var('SNOWFLAKE_DATABASE', 'DATA_PIPELINE') }}"
    schema: RAW
    tables:
      - name: landing
        identifier: LANDING
        description: "Unified VARIANT landing table \u2014 all ingested sources."
        loaded_at_field: ingested_at
        freshness:
          warn_after:  {count: 12, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: load_id
            description: "Lambda request id for the load that inserted this row."
            tests:
              - not_null
          - name: source
            description: "Logical source name (matches ingest event source_name)."
            tests:
              - not_null
          - name: file_path
            description: "S3 object key, from METADATA$FILENAME during COPY INTO."
          - name: ingested_at
            description: "Load timestamp."
            tests:
              - not_null
          - name: data
            description: "Full JSON record as Snowflake VARIANT."
            tests:
              - not_null
