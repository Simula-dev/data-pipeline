version: 2

sources:
  - name: raw
    description: "Raw landing zone populated by the load Lambda."
    database: "{{ env_var('POSTGRES_DATABASE', 'data_pipeline') }}"
    schema: raw
    tables:
      - name: landing
        description: "Unified jsonb landing table - all ingested sources."
        loaded_at_field: ingested_at
        freshness:
          warn_after:  {count: 12, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: load_id
            tests: [not_null]
          - name: source
            tests: [not_null]
          - name: file_path
          - name: ingested_at
            tests: [not_null]
          - name: data
            description: "Full JSON record as PostgreSQL jsonb type."
            tests: [not_null]
